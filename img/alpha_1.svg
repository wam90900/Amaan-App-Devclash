<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fef9c3" rx="12"/>
  
  <!-- Big Red Car / Cell -->
  <ellipse cx="200" cy="180" rx="90" ry="45" fill="#ef4444"/>
  <circle cx="150" cy="225" r="15" fill="#334155"/>
  <circle cx="250" cy="225" r="15" fill="#334155"/>
  
  <path d="M 170 180 Q 200 150 230 180" fill="none" stroke="#fca5a5" stroke-width="6" stroke-linecap="round"/>

  <!-- Workers (stickmen with hard hats) -->
  <!-- Worker 1 -->
  <g transform="translate(90, 150)">
    <path d="M0 20 Q0 0 20 0 Q40 0 40 20" fill="#eab308"/> <!-- Hat -->
    <circle cx="20" cy="25" r="12" fill="#fca5a5"/>
    <rect x="12" y="37" width="16" height="25" fill="#3b82f6" rx="4"/>
    <circle cx="15" cy="22" r="2" fill="black"/>
    <circle cx="25" cy="22" r="2" fill="black"/>
  </g>

  <!-- Worker 2 -->
  <g transform="translate(160, 100)">
    <path d="M0 20 Q0 0 20 0 Q40 0 40 20" fill="#eab308"/>
    <circle cx="20" cy="25" r="12" fill="#fca5a5"/>
    <rect x="12" y="37" width="16" height="25" fill="#3b82f6" rx="4"/>
    <circle cx="15" cy="22" r="2" fill="black"/>
    <circle cx="25" cy="22" r="2" fill="black"/>
  </g>

  <!-- Worker 3 -->
  <g transform="translate(230, 100)">
    <path d="M0 20 Q0 0 20 0 Q40 0 40 20" fill="#eab308"/>
    <circle cx="20" cy="25" r="12" fill="#fca5a5"/>
    <rect x="12" y="37" width="16" height="25" fill="#3b82f6" rx="4"/>
    <circle cx="15" cy="22" r="2" fill="black"/>
    <circle cx="25" cy="22" r="2" fill="black"/>
  </g>
  
  <!-- Empty spot with a sign -->
  <g transform="translate(300, 160)">
    <rect x="15" y="20" width="5" height="40" fill="#94a3b8"/>
    <rect x="0" y="0" width="40" height="25" fill="#f87171" rx="4"/>
    <line x1="8" y1="10" x2="32" y2="10" stroke="white" stroke-width="2"/>
    <line x1="12" y1="16" x2="28" y2="16" stroke="white" stroke-width="2"/>
  </g>
  
  <!-- A little wrench -->
  <path d="M120 180 L 135 165 L 140 170 L 125 185 Z" fill="#94a3b8"/>

</svg>
