<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#fce7f3" rx="12"/>
  
  <!-- Windpipe -->
  <rect x="185" y="40" width="30" height="90" fill="#f472b6" rx="5"/>
  <line x1="185" y1="60" x2="215" y2="60" stroke="#db2777" stroke-width="3"/>
  <line x1="185" y1="80" x2="215" y2="80" stroke="#db2777" stroke-width="3"/>
  <line x1="185" y1="100" x2="215" y2="100" stroke="#db2777" stroke-width="3"/>
  
  <!-- Left Lung (Sad/Heavy) -->
  <path d="M190 120 Q 80 100 80 200 Q 80 260 170 260 Q 190 200 190 120" fill="#fbcfe8" stroke="#f472b6" stroke-width="6"/>
  
  <!-- Right Lung (Sad/Heavy) -->
  <path d="M210 120 Q 320 100 320 200 Q 320 260 230 260 Q 210 200 210 120" fill="#fbcfe8" stroke="#f472b6" stroke-width="6"/>
  
  <path d="M 120 170 Q 130 160 140 170" fill="none" stroke="#db2777" stroke-width="3" stroke-linecap="round"/>
  <path d="M 280 170 Q 270 160 260 170" fill="none" stroke="#db2777" stroke-width="3" stroke-linecap="round"/>

  <!-- Sticky purple jelly clogging the lungs -->
  <circle cx="130" cy="220" r="22" fill="#a855f7"/>
  <circle cx="160" cy="235" r="28" fill="#a855f7"/>
  <circle cx="145" cy="190" r="16" fill="#a855f7"/>
  <path d="M 120 220 Q 145 200 170 240 Q 140 260 120 220" fill="#c084fc"/>

  <circle cx="270" cy="220" r="22" fill="#a855f7"/>
  <circle cx="240" cy="245" r="25" fill="#a855f7"/>
  <circle cx="255" cy="195" r="18" fill="#a855f7"/>
  <path d="M 280 220 Q 255 200 230 240 Q 260 260 280 220" fill="#c084fc"/>

  <!-- Jelly drops -->
  <circle cx="110" cy="245" r="5" fill="#a855f7"/>
  <circle cx="285" cy="245" r="5" fill="#a855f7"/>
  
</svg>
