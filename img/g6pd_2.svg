<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#e0f2fe" rx="12"/>
  
  <!-- Magic shield breaking / bouncing -->
  <circle cx="120" cy="150" r="60" fill="none" stroke="#60a5fa" stroke-width="4" stroke-dasharray="8,8"/>
  
  <!-- Red Blood Cell (scared/surprised) -->
  <circle cx="120" cy="150" r="45" fill="#ef4444"/>
  <ellipse cx="105" cy="140" rx="4" ry="8" fill="white"/>
  <ellipse cx="135" cy="140" rx="4" ry="8" fill="white"/>
  <circle cx="105" cy="140" r="2" fill="black"/>
  <circle cx="135" cy="140" r="2" fill="black"/>
  <path d="M 110 160 Q 120 170 130 160" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Naughty Fava beans bouncing nearby -->
  <g transform="translate(250, 100)">
    <path d="M 0 0 Q 30 -40 50 10 Q 30 40 0 0" fill="#22c55e"/>
    <circle cx="20" cy="-5" r="5" fill="white"/>
    <circle cx="35" cy="-5" r="5" fill="white"/>
    <circle cx="18" cy="-5" r="2" fill="black"/>
    <circle cx="33" cy="-5" r="2" fill="black"/>
    <path d="M 22 10 Q 28 15 32 10" fill="none" stroke="#166534" stroke-width="2"/>
  </g>
  
  <g transform="translate(260, 200) rotate(-30)">
    <path d="M 0 0 Q 30 -40 50 10 Q 30 40 0 0" fill="#4ade80"/>
    <circle cx="20" cy="-5" r="5" fill="white"/>
    <circle cx="35" cy="-5" r="5" fill="white"/>
    <circle cx="22" cy="-5" r="2" fill="black"/>
    <circle cx="37" cy="-5" r="2" fill="black"/>
  </g>

  <!-- Speed lines or fear lines -->
  <line x1="230" y1="130" x2="200" y2="140" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="240" y1="210" x2="190" y2="180" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  
</svg>
